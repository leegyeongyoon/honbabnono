name: Deploy to Raspberry Pi

on:
  push:
    branches: [ main ]
    paths-ignore:
      - '*.md'
      - 'terraform/**'
      - '.github/workflows/deploy.yml'
      - '.github/workflows/deploy-admin.yml'
      - '.github/workflows/cost-check.yml'
      - '.github/workflows/cleanup.yml'
      - '.github/workflows/destroy.yml'
      - '.github/workflows/emergency-cleanup.yml'
  workflow_dispatch:

jobs:
  deploy:
    name: Deploy to Raspberry Pi
    runs-on: ubuntu-latest
    timeout-minutes: 40

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Install cloudflared
      run: |
        curl -fsSL https://github.com/cloudflare/cloudflared/releases/latest/download/cloudflared-linux-amd64.deb -o cloudflared.deb
        sudo dpkg -i cloudflared.deb

    - name: Setup SSH
      run: |
        mkdir -p ~/.ssh
        echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/id_rsa
        chmod 600 ~/.ssh/id_rsa
        cat >> ~/.ssh/config << 'SSHCONFIG'
        Host deploy.eattable.kr
          ProxyCommand cloudflared access ssh --hostname %h
          StrictHostKeyChecking no
          UserKnownHostsFile /dev/null
        SSHCONFIG

    - name: Test SSH connection
      run: |
        ssh -o ConnectTimeout=15 ${{ secrets.DEPLOY_USER }}@deploy.eattable.kr 'echo "Connected to $(hostname)"'

    - name: Sync code
      run: |
        rsync -avz --delete \
          -e "ssh -o ProxyCommand='cloudflared access ssh --hostname deploy.eattable.kr'" \
          --exclude='node_modules' \
          --exclude='.git' \
          --exclude='ios' \
          --exclude='android' \
          --exclude='*.hwpx' \
          --exclude='*.docx' \
          --exclude='.env' \
          --exclude='.env.development' \
          --exclude='.env.test' \
          ./ ${{ secrets.DEPLOY_USER }}@deploy.eattable.kr:/home/gyoungyoon/eattable/app/

    - name: Build and deploy
      run: |
        ssh ${{ secrets.DEPLOY_USER }}@deploy.eattable.kr << 'EOF'
          cd /home/gyoungyoon/eattable
          echo "=== Docker build ==="
          docker compose up -d --build app 2>&1 | tail -20
          echo "=== Waiting for startup ==="
          sleep 30
          HTTP=$(curl -s -o /dev/null -w "%{http_code}" http://localhost:80/)
          API=$(curl -s -o /dev/null -w "%{http_code}" http://localhost:80/api/health)
          echo "Web: $HTTP | API: $API"
          docker ps --format "table {{.Names}}\t{{.Status}}"
          if [ "$HTTP" = "200" ] && [ "$API" = "200" ]; then
            echo "Deploy SUCCESS"
          else
            echo "Deploy WARNING - check logs"
            docker logs eattable-app --tail 10
            exit 1
          fi
        EOF

    - name: Summary
      if: always()
      run: |
        echo "https://eattable.kr"
        echo "Commit: ${{ github.sha }}"
        echo "By: ${{ github.actor }}"
