<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>잇테이블 - 선주문 예약으로 기다림 없는 외식</title>
    <link rel="icon" type="image/png" href="./favicon.png">
    <link rel="apple-touch-icon" href="./apple-touch-icon.png">
    <link rel="preconnect" href="https://cdn.jsdelivr.net">
    <link rel="stylesheet" as="style" crossorigin href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/variable/pretendardvariable.min.css" />
    <style>
        /* === Reset & Base === */
        * {
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }
        html {
            scroll-behavior: smooth;
        }
        ::selection {
            background: rgba(255, 165, 41, 0.18);
        }
        html, body {
            margin: 0;
            padding: 0;
            height: 100%;
            font-family: "Pretendard Variable", Pretendard, -apple-system, BlinkMacSystemFont, system-ui, Roboto, "Helvetica Neue", "Segoe UI", "Apple SD Gothic Neo", "Noto Sans KR", "Malgun Gothic", "Apple Color Emoji", "Segoe UI Emoji", "Segoe UI Symbol", sans-serif;
            background-color: #ffffff !important;
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
            touch-action: pan-x pan-y;
            -webkit-touch-callout: none;
            -webkit-user-select: none;
            -moz-user-select: none;
            -ms-user-select: none;
            user-select: none;
            -webkit-text-size-adjust: 100%;
            -ms-text-size-adjust: 100%;
            color: #121212;
            letter-spacing: -0.02em;
        }
        input, textarea, [contenteditable="true"] {
            -webkit-user-select: text !important;
            -moz-user-select: text !important;
            -ms-user-select: text !important;
            user-select: text !important;
        }
        #root {
            height: 100vh;
            display: flex;
            flex-direction: column;
        }

        /* === Scrollbar — 모바일 앱처럼 숨김 === */
        ::-webkit-scrollbar { width: 0; height: 0; background: transparent; }
        * { scrollbar-width: none; -ms-overflow-style: none; }

        /* === 포커스 링 — 접근성 + 브랜드 컬러 === */
        :focus-visible {
            outline: 2px solid rgba(255,165,41,0.5);
            outline-offset: 2px;
            border-radius: 4px;
        }
        input:focus, textarea:focus {
            outline: none;
        }

        /* === 전역 트랜지션 === */
        a, button, [role="button"] {
            transition: opacity 150ms ease, transform 150ms ease;
        }
        a:active, button:active, [role="button"]:active {
            transform: scale(0.97);
            opacity: 0.85;
        }
        img {
            -webkit-user-drag: none;
            user-select: none;
        }

        /* === 애니메이션 키프레임 === */
        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(12px); }
            to { opacity: 1; transform: translateY(0); }
        }
        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }
        @keyframes slideUp {
            from { transform: translateY(100%); }
            to { transform: translateY(0); }
        }
        @keyframes slideDown {
            from { transform: translateY(-20px); opacity: 0; }
            to { transform: translateY(0); opacity: 1; }
        }
        @keyframes shimmer {
            0% { background-position: -200% 0; }
            100% { background-position: 200% 0; }
        }
        @keyframes pulse {
            0%, 100% { opacity: 0.4; }
            50% { opacity: 0.8; }
        }
        @keyframes scaleIn {
            from { opacity: 0; transform: scale(0.92); }
            to { opacity: 1; transform: scale(1); }
        }
        @keyframes ripple {
            to { transform: scale(2.5); opacity: 0; }
        }

        /* === 스켈레톤 로더 — 시머 효과 === */
        .skeleton {
            background: linear-gradient(90deg, #f0f0f0 25%, #e8e8e8 50%, #f0f0f0 75%);
            background-size: 200% 100%;
            animation: shimmer 1.5s ease-in-out infinite;
            border-radius: 6px;
        }
        .skeleton-circle {
            background: linear-gradient(90deg, #f0f0f0 25%, #e8e8e8 50%, #f0f0f0 75%);
            background-size: 200% 100%;
            animation: shimmer 1.5s ease-in-out infinite;
            border-radius: 50%;
        }

        /* === 카드 호버 — 프로덕션 퀄리티 === */
        .card-hover {
            transition: transform 200ms cubic-bezier(0.22,1,0.36,1), box-shadow 200ms cubic-bezier(0.22,1,0.36,1);
        }
        .card-hover:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 24px rgba(17,17,17,0.08), 0 2px 8px rgba(17,17,17,0.04);
        }
        .card-hover:active {
            transform: translateY(0) scale(0.99);
            box-shadow: 0 2px 8px rgba(17,17,17,0.04);
        }

        /* === 버튼 프레스 이펙트 === */
        .btn-press {
            transition: transform 120ms ease, background-color 120ms ease;
        }
        .btn-press:active {
            transform: scale(0.96);
        }

        /* === 페이드인 애니메이션 유틸 === */
        .animate-fade-in { animation: fadeIn 300ms ease-out forwards; }
        .animate-fade-in-up { animation: fadeInUp 400ms cubic-bezier(0.22,1,0.36,1) forwards; }
        .animate-scale-in { animation: scaleIn 250ms cubic-bezier(0.22,1,0.36,1) forwards; }

        /* === 리플 이펙트 === */
        .ripple-container {
            position: relative;
            overflow: hidden;
        }
        .ripple-container::after {
            content: '';
            display: block;
            position: absolute;
            width: 100%;
            height: 100%;
            top: 0;
            left: 0;
            pointer-events: none;
            background-image: radial-gradient(circle, rgba(0,0,0,0.06) 10%, transparent 10.01%);
            background-repeat: no-repeat;
            background-position: 50%;
            transform: scale(0);
            opacity: 0;
            transition: transform 0.4s, opacity 0.3s;
        }
        .ripple-container:active::after {
            transform: scale(2.5);
            opacity: 1;
            transition: 0s;
        }

        /* === 플레이스홀더 === */
        input::placeholder, textarea::placeholder {
            color: #7E8082;
            opacity: 1;
        }

        /* === Safe area 대응 (iOS 노치) === */
        @supports (padding-top: env(safe-area-inset-top)) {
            body {
                padding-top: env(safe-area-inset-top);
                padding-bottom: env(safe-area-inset-bottom);
            }
        }

        /* === 인쇄 방지 === */
        @media print { body { display: none; } }
    </style>
</head>
<body>
    <div id="root"></div>
    <script src="https://t1.kakaocdn.net/kakao_js_sdk/2.7.4/kakao.min.js" integrity="sha384-DKYJZ8NLiK8MN4/C5P2dtSmLQ4KwPaoqAfyA/DfmEc1VDxu4yyC7wy6K1Ber76" crossorigin="anonymous"></script>
    <script src="./bundle.js"></script>
</body>
</html>
