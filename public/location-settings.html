<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>지역 설정</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body, html {
            width: 100%; height: 100%; overflow: hidden;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
        }

        /* 지도 영역 */
        #map {
            width: 100%;
            height: 100%;
        }

        /* 상단 검색 영역 */
        .search-container {
            position: absolute;
            top: 0; left: 0; right: 0;
            padding: 12px 16px;
            padding-top: max(12px, env(safe-area-inset-top));
            background: linear-gradient(to bottom, rgba(255,255,255,0.98), rgba(255,255,255,0.9));
            z-index: 1000;
        }
        .search-title {
            font-size: 16px;
            font-weight: 700;
            color: #333;
            margin-bottom: 8px;
            text-align: center;
        }
        .search-box {
            display: flex;
            gap: 8px;
        }
        .search-input {
            flex: 1;
            padding: 12px 16px;
            border: 1px solid #ddd;
            border-radius: 12px;
            font-size: 15px;
            background: white;
            outline: none;
        }
        .search-input:focus {
            border-color: #D4882C;
        }
        .search-btn {
            padding: 12px 16px;
            background: #D4882C;
            color: white;
            border: none;
            border-radius: 12px;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
        }
        .search-btn:active {
            background: #8B5216;
        }

        /* 검색 결과 */
        .search-results {
            position: absolute;
            top: 100px;
            left: 16px;
            right: 16px;
            background: white;
            border-radius: 12px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.15);
            max-height: 300px;
            overflow-y: auto;
            z-index: 1001;
            display: none;
        }
        .search-result-item {
            padding: 14px 16px;
            border-bottom: 1px solid #f0f0f0;
            cursor: pointer;
        }
        .search-result-item:last-child {
            border-bottom: none;
        }
        .search-result-item:active {
            background: #f8f8f8;
        }
        .search-result-name {
            font-size: 15px;
            font-weight: 600;
            color: #333;
            margin-bottom: 4px;
        }
        .search-result-address {
            font-size: 13px;
            color: #888;
        }

        /* 반경 선택 버튼 */
        .radius-selector {
            position: absolute;
            top: 110px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            gap: 8px;
            z-index: 1000;
            background: white;
            padding: 8px;
            border-radius: 24px;
            box-shadow: 0 2px 12px rgba(0,0,0,0.15);
        }
        .radius-btn {
            padding: 10px 14px;
            border: none;
            border-radius: 20px;
            font-size: 13px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
            background: #f5f5f5;
            color: #666;
        }
        .radius-btn.active {
            background: #D4882C;
            color: white;
        }
        .radius-btn:active {
            transform: scale(0.95);
        }

        /* 현재 위치 버튼 */
        .current-location-btn {
            position: absolute;
            right: 16px;
            bottom: 200px;
            width: 48px;
            height: 48px;
            background: white;
            border-radius: 50%;
            box-shadow: 0 2px 8px rgba(0,0,0,0.2);
            border: none;
            font-size: 22px;
            cursor: pointer;
            z-index: 999;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .current-location-btn:active {
            background: #f5f5f5;
        }

        /* 하단 컨트롤 패널 */
        .control-panel {
            position: absolute;
            bottom: 0; left: 0; right: 0;
            background: white;
            padding: 20px;
            padding-bottom: max(20px, env(safe-area-inset-bottom));
            box-shadow: 0 -4px 20px rgba(0,0,0,0.1);
            z-index: 1000;
            border-radius: 24px 24px 0 0;
        }

        .location-info {
            margin-bottom: 16px;
        }
        .location-title {
            font-size: 20px;
            font-weight: 700;
            color: #333;
            margin-bottom: 4px;
        }
        .location-detail {
            font-size: 14px;
            color: #888;
        }
        .radius-info {
            display: inline-block;
            background: #D4882C;
            color: white;
            padding: 4px 12px;
            border-radius: 12px;
            font-size: 13px;
            font-weight: 600;
            margin-top: 8px;
        }

        .button-group {
            display: flex;
            gap: 12px;
        }
        .btn {
            flex: 1;
            padding: 16px;
            border: none;
            border-radius: 12px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
        }
        .btn-primary {
            background: #D4882C;
            color: white;
        }
        .btn-primary:active {
            background: #8B5216;
        }
        .btn-secondary {
            background: #f0f0f0;
            color: #333;
        }
        .btn-secondary:active {
            background: #e0e0e0;
        }

        /* 로딩 */
        .loading {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            background: white;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 2000;
        }
        .loading-spinner {
            width: 48px;
            height: 48px;
            border: 4px solid #f3f3f3;
            border-top: 4px solid #D4882C;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        .loading p {
            margin-top: 16px;
            color: #666;
            font-size: 16px;
        }

        /* 중앙 마커 */
        .center-marker {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            z-index: 100;
            pointer-events: none;
            font-size: 48px;
            margin-top: -24px;
        }
    </style>
</head>
<body>
    <div id="loading" class="loading">
        <div class="loading-spinner"></div>
        <p>지도를 불러오는 중...</p>
    </div>

    <!-- 상단 검색 영역 -->
    <div class="search-container">
        <div class="search-title">내 활동 지역 설정</div>
        <div class="search-box">
            <input type="text" class="search-input" id="searchInput" placeholder="지역명, 주소 검색 (예: 강남역, 홍대)" />
            <button class="search-btn" onclick="searchLocation()">검색</button>
        </div>
    </div>

    <!-- 검색 결과 -->
    <div class="search-results" id="searchResults"></div>

    <!-- 반경 선택 -->
    <div class="radius-selector">
        <button class="radius-btn" data-radius="3" onclick="setRadius(3)">3km</button>
        <button class="radius-btn" data-radius="5" onclick="setRadius(5)">5km</button>
        <button class="radius-btn active" data-radius="10" onclick="setRadius(10)">10km</button>
        <button class="radius-btn" data-radius="30" onclick="setRadius(30)">30km</button>
    </div>

    <div id="map"></div>
    <div class="center-marker">📍</div>

    <button class="current-location-btn" onclick="getCurrentLocation()">🎯</button>

    <!-- 하단 패널 -->
    <div class="control-panel">
        <div class="location-info">
            <div class="location-title" id="locationTitle">지역을 선택해주세요</div>
            <div class="location-detail" id="locationDetail">지도를 움직이거나 검색하세요</div>
            <div class="radius-info" id="radiusInfo">반경 10km</div>
        </div>
        <div class="button-group">
            <button class="btn btn-secondary" onclick="closeMap()">취소</button>
            <button class="btn btn-primary" onclick="selectLocation()">이 지역으로 설정</button>
        </div>
    </div>

    <script src="https://dapi.kakao.com/v2/maps/sdk.js?appkey=5a202bd90ab8dff01348f24cb1c37f3f&libraries=services&autoload=false"></script>
    <script>
        let map, geocoder, circle, places;
        let currentRadius = 10; // km
        let gpsAttempted = false;
        let currentLocation = {
            lat: 37.4979,  // 강남역 기본 위치
            lng: 127.0276,
            district: '강남구',
            neighborhood: '역삼동',
            address: '서울특별시 강남구 역삼동'
        };

        // React Native로 메시지 전송
        function sendMessage(type, data) {
            if (window.ReactNativeWebView) {
                window.ReactNativeWebView.postMessage(JSON.stringify({ type, data }));
            }
            console.log('sendMessage:', type, data);
        }

        // 지도 초기화
        function initMap() {
            console.log('🗺️ initMap 시작');
            const container = document.getElementById('map');
            const options = {
                center: new kakao.maps.LatLng(currentLocation.lat, currentLocation.lng),
                level: getMapLevel(currentRadius)
            };

            map = new kakao.maps.Map(container, options);
            geocoder = new kakao.maps.services.Geocoder();
            places = new kakao.maps.services.Places();
            console.log('🗺️ 지도 생성 완료');

            // 반경 원 생성
            circle = new kakao.maps.Circle({
                center: new kakao.maps.LatLng(currentLocation.lat, currentLocation.lng),
                radius: currentRadius * 1000, // m 단위
                strokeWeight: 3,
                strokeColor: '#D4882C',
                strokeOpacity: 1,
                strokeStyle: 'solid',
                fillColor: '#D4882C',
                fillOpacity: 0.15
            });
            circle.setMap(map);
            console.log('🔴 반경 원 생성 완료, 반경:', currentRadius, 'km');

            // 드래그 종료 이벤트
            kakao.maps.event.addListener(map, 'dragend', function() {
                updateLocation();
            });

            // 줌 변경 이벤트
            kakao.maps.event.addListener(map, 'zoom_changed', function() {
                updateCircle();
            });

            // 검색 입력 엔터 키 이벤트
            document.getElementById('searchInput').addEventListener('keypress', function(e) {
                if (e.key === 'Enter') {
                    searchLocation();
                }
            });

            // 검색 입력 포커스 아웃 시 결과 숨기기
            document.addEventListener('click', function(e) {
                if (!e.target.closest('.search-container') && !e.target.closest('.search-results')) {
                    document.getElementById('searchResults').style.display = 'none';
                }
            });

            // React Native WebView인 경우 React Native에서 GPS 좌표를 전송해줄 것이므로
            // WebView 자체 GPS는 호출하지 않음 (iOS WebView GPS 문제 해결)
            if (window.ReactNativeWebView) {
                console.log('📍 React Native WebView 감지 - GPS 좌표 수신 대기');
                // 기본 위치로 역지오코딩 먼저 수행 (React Native 좌표가 오면 덮어씀)
                const latlng = new kakao.maps.LatLng(currentLocation.lat, currentLocation.lng);
                reverseGeocode(latlng);
            } else {
                // 웹 브라우저에서 직접 열린 경우 WebView GPS 사용
                getCurrentLocation();
            }

            document.getElementById('loading').style.display = 'none';
            sendMessage('MAP_READY', { status: 'ready' });
        }

        // 반경에 따른 지도 레벨 (중간값으로 조정)
        function getMapLevel(radius) {
            if (radius <= 3) return 7;   // 3km 반경
            if (radius <= 5) return 8;   // 5km 반경
            if (radius <= 10) return 9;  // 10km 반경
            return 11; // 30km 반경
        }

        // 지역 검색
        function searchLocation() {
            const keyword = document.getElementById('searchInput').value.trim();
            if (!keyword) return;

            // 키워드로 장소 검색
            places.keywordSearch(keyword, function(result, status) {
                const resultsDiv = document.getElementById('searchResults');

                if (status === kakao.maps.services.Status.OK) {
                    resultsDiv.innerHTML = '';
                    resultsDiv.style.display = 'block';

                    // 최대 5개 결과 표시
                    const items = result.slice(0, 5);
                    items.forEach(function(place) {
                        const item = document.createElement('div');
                        item.className = 'search-result-item';
                        item.innerHTML = `
                            <div class="search-result-name">${place.place_name}</div>
                            <div class="search-result-address">${place.address_name}</div>
                        `;
                        item.onclick = function() {
                            moveToLocation(place.y, place.x, place.address_name, place.place_name);
                            resultsDiv.style.display = 'none';
                            document.getElementById('searchInput').value = place.place_name;
                        };
                        resultsDiv.appendChild(item);
                    });
                } else {
                    // 주소로 검색 시도
                    geocoder.addressSearch(keyword, function(result, status) {
                        if (status === kakao.maps.services.Status.OK) {
                            resultsDiv.innerHTML = '';
                            resultsDiv.style.display = 'block';

                            result.slice(0, 5).forEach(function(addr) {
                                const item = document.createElement('div');
                                item.className = 'search-result-item';
                                item.innerHTML = `
                                    <div class="search-result-name">${addr.address_name}</div>
                                    <div class="search-result-address">${addr.address?.region_2depth_name || ''} ${addr.address?.region_3depth_name || ''}</div>
                                `;
                                item.onclick = function() {
                                    moveToLocation(addr.y, addr.x, addr.address_name, '');
                                    resultsDiv.style.display = 'none';
                                    document.getElementById('searchInput').value = addr.address_name;
                                };
                                resultsDiv.appendChild(item);
                            });
                        } else {
                            resultsDiv.innerHTML = '<div class="search-result-item"><div class="search-result-name">검색 결과가 없습니다</div></div>';
                            resultsDiv.style.display = 'block';
                        }
                    });
                }
            });
        }

        // 특정 위치로 이동
        function moveToLocation(lat, lng, address, name) {
            const latlng = new kakao.maps.LatLng(lat, lng);
            map.setCenter(latlng);
            map.setLevel(getMapLevel(currentRadius));

            currentLocation.lat = parseFloat(lat);
            currentLocation.lng = parseFloat(lng);
            currentLocation.address = address;

            circle.setPosition(latlng);
            reverseGeocode(latlng);
        }

        // 위치 업데이트
        function updateLocation() {
            const center = map.getCenter();
            currentLocation.lat = center.getLat();
            currentLocation.lng = center.getLng();

            // 원 위치 업데이트
            circle.setPosition(center);

            // 주소 가져오기
            reverseGeocode(center);
        }

        // 원 업데이트
        function updateCircle() {
            const center = map.getCenter();
            circle.setPosition(center);
        }

        // 반경 설정
        function setRadius(radius) {
            currentRadius = radius;

            // 버튼 상태 업데이트
            document.querySelectorAll('.radius-btn').forEach(btn => {
                btn.classList.remove('active');
                if (parseInt(btn.dataset.radius) === radius) {
                    btn.classList.add('active');
                }
            });

            // 원 반경 업데이트
            circle.setRadius(radius * 1000);

            // 지도 레벨 조정
            map.setLevel(getMapLevel(radius));

            // 반경 정보 업데이트
            document.getElementById('radiusInfo').textContent = `반경 ${radius}km`;
        }

        // 좌표 -> 주소 변환
        function reverseGeocode(coords) {
            geocoder.coord2Address(coords.getLng(), coords.getLat(), function(result, status) {
                if (status === kakao.maps.services.Status.OK && result[0]) {
                    const addr = result[0];
                    const address = addr.road_address ? addr.road_address.address_name : addr.address.address_name;

                    currentLocation.address = address;
                    currentLocation.district = addr.address ? addr.address.region_2depth_name : '';
                    currentLocation.neighborhood = addr.address ? addr.address.region_3depth_name : '';

                    // UI 업데이트
                    const title = currentLocation.district + (currentLocation.neighborhood ? ' ' + currentLocation.neighborhood : '');
                    document.getElementById('locationTitle').textContent = title || '알 수 없는 지역';
                    document.getElementById('locationDetail').textContent = address;
                }
            });
        }

        // 현재 위치 가져오기 (WebView 자체 GPS - 대체용)
        function getCurrentLocation() {
            console.log('📍 GPS 위치 가져오기 시도...');
            if (navigator.geolocation) {
                navigator.geolocation.getCurrentPosition(
                    function(pos) {
                        console.log('📍 GPS 성공:', pos.coords.latitude, pos.coords.longitude);
                        gpsAttempted = true;
                        const latlng = new kakao.maps.LatLng(pos.coords.latitude, pos.coords.longitude);
                        map.setCenter(latlng);
                        currentLocation.lat = pos.coords.latitude;
                        currentLocation.lng = pos.coords.longitude;
                        circle.setPosition(latlng);
                        reverseGeocode(latlng);
                        sendMessage('GPS_LOCATION', { lat: pos.coords.latitude, lng: pos.coords.longitude });
                    },
                    function(error) {
                        console.log('📍 GPS 실패:', error.code, error.message);
                        gpsAttempted = true;
                        // 실패해도 기본 위치(강남역)로 역지오코딩 수행
                        const latlng = new kakao.maps.LatLng(currentLocation.lat, currentLocation.lng);
                        reverseGeocode(latlng);
                        sendMessage('GPS_ERROR', { code: error.code, message: error.message });
                    },
                    { enableHighAccuracy: true, timeout: 15000, maximumAge: 0 }
                );
            } else {
                console.log('📍 Geolocation API 지원 안 함');
                gpsAttempted = true;
                // API 지원 안 하면 기본 위치로
                const latlng = new kakao.maps.LatLng(currentLocation.lat, currentLocation.lng);
                reverseGeocode(latlng);
            }
        }

        // React Native에서 GPS 좌표 수신 (iOS WebView GPS 문제 해결용)
        function setLocationFromNative(lat, lng) {
            console.log('📍 React Native에서 좌표 수신:', lat, lng);

            // 한국 범위 체크 (위도: 33~43, 경도: 124~132)
            // 범위를 벗어나면 서울 시청 좌표로 대체
            const isInKorea = lat >= 33 && lat <= 43 && lng >= 124 && lng <= 132;
            if (!isInKorea) {
                console.log('📍 한국 범위를 벗어남, 서울 시청 좌표로 대체');
                lat = 37.5665;  // 서울 시청 위도
                lng = 126.9780; // 서울 시청 경도
            }

            if (!map || !circle) {
                console.log('📍 지도가 아직 준비되지 않음, 좌표 저장만');
                currentLocation.lat = lat;
                currentLocation.lng = lng;
                return;
            }

            const latlng = new kakao.maps.LatLng(lat, lng);
            map.setCenter(latlng);
            currentLocation.lat = lat;
            currentLocation.lng = lng;
            circle.setPosition(latlng);
            reverseGeocode(latlng);
            sendMessage('GPS_LOCATION', { lat: lat, lng: lng });
        }

        // React Native에서 초기 반경 설정 (저장된 반경 복원용)
        function setInitialRadiusFromNative(radiusKm) {
            console.log('📍 React Native에서 초기 반경 수신:', radiusKm, 'km');

            // 유효한 반경 값인지 확인 (3, 5, 10, 30 중 하나)
            const validRadii = [3, 5, 10, 30];
            if (!validRadii.includes(radiusKm)) {
                console.log('📍 유효하지 않은 반경, 기본값 10km 사용');
                radiusKm = 10;
            }

            // setRadius 함수를 호출하여 반경 설정 (UI 및 지도 업데이트 포함)
            setRadius(radiusKm);
        }

        // 위치 선택 완료
        function selectLocation() {
            // 데이터 유효성 검사
            if (!currentLocation.lat || !currentLocation.lng) {
                alert('위치 정보를 가져오는 중입니다. 잠시 후 다시 시도해주세요.');
                return;
            }

            console.log('📍 위치 선택 전송:', currentLocation);
            sendMessage('LOCATION_SELECTED', {
                latitude: currentLocation.lat,
                longitude: currentLocation.lng,
                address: currentLocation.address || '주소 정보 없음',
                district: currentLocation.district || '',
                neighborhood: currentLocation.neighborhood || '',
                radius: currentRadius
            });
        }

        // 닫기
        function closeMap() {
            sendMessage('CLOSE_MAP', {});
        }

        // 카카오맵 SDK 로드
        kakao.maps.load(initMap);
    </script>
</body>
</html>
